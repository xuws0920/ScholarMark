<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PDF 文献阅读器 - 标注与 Markdown 笔记工具">
  <title>ScholarMark - PDF 文献阅读标注</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/index.css">
  <link rel="stylesheet" href="/src/styles/sidebar.css">
  <link rel="stylesheet" href="/src/styles/pdf-viewer.css">
  <link rel="stylesheet" href="/src/styles/notes.css">
</head>

<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <h1 class="app-title"><span class="title-icon">📚</span> ScholarMark</h1>
      </div>
      <div class="header-center">
        <span id="current-pdf-name" class="current-doc-name">未打开文献</span>
      </div>
      <div class="header-right">
        <button id="btn-toggle-theme" class="header-btn" title="切换主题">
          <svg id="icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg id="icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="display:none;">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button id="btn-settings" class="header-btn" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <main id="app-main">
      <aside id="sidebar-left" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-sidebar-tab="library">文献库</button>
            <button class="sidebar-tab" data-sidebar-tab="outline">目录</button>
          </div>
          <button id="btn-import-pdf" class="btn-accent" title="导入 PDF">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            导入
          </button>
        </div>

        <div id="pdf-library-wrapper" class="sidebar-panel">
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="搜索标注和笔记..." autocomplete="off">
            <button id="btn-clear-search" class="btn-clear-search" title="清除搜索" style="display:none;">×</button>
          </div>
          <div id="search-results" class="search-results" style="display:none;"></div>
          <div id="pdf-library" class="pdf-library">
            <div id="pdf-list" class="pdf-list"></div>
            <div id="pdf-drop-zone" class="drop-zone">
              <div class="drop-zone-content">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="12" y1="18" x2="12" y2="12" />
                  <polyline points="9 15 12 12 15 15" />
                </svg>
                <p>拖放 PDF 文件到此处</p>
                <span>或点击“导入”按钮</span>
              </div>
            </div>
          </div>
        </div>

        <div id="pdf-outline-panel" class="sidebar-panel" style="display:none;">
          <div id="pdf-outline-tree" class="outline-tree">
            <p class="outline-empty">请先打开 PDF 文献</p>
          </div>
        </div>

        <input type="file" id="file-input" accept=".pdf" multiple style="display:none;">
      </aside>

      <div class="resize-handle resize-handle-left" id="resize-left"></div>

      <section id="pdf-viewer-section" class="viewer-section">
        <div id="pdf-toolbar" class="pdf-toolbar">
          <div class="toolbar-group">
            <button id="btn-prev-page" class="toolbar-btn" title="上一页" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
            <span class="page-info">
              <input type="number" id="page-num-input" min="1" value="1"> / <span id="page-count">0</span>
            </span>
            <button id="btn-next-page" class="toolbar-btn" title="下一页" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>
          <div class="toolbar-group">
            <button id="btn-zoom-out" class="toolbar-btn" title="缩小">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                <line x1="8" y1="11" x2="14" y2="11" />
              </svg>
            </button>
            <span id="zoom-level" class="zoom-level">100%</span>
            <button id="btn-zoom-in" class="toolbar-btn" title="放大">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                <line x1="11" y1="8" x2="11" y2="14" />
                <line x1="8" y1="11" x2="14" y2="11" />
              </svg>
            </button>
            <button id="btn-fit-width" class="toolbar-btn" title="适应宽度">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 3H3v18h18V3z" />
                <path d="M9 3v18" />
                <path d="M15 3v18" />
              </svg>
            </button>
          </div>
        </div>

        <div id="pdf-container" class="pdf-container">
          <div id="pdf-pages" class="pdf-pages"></div>
          <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-content">
              <div class="welcome-icon">📄</div>
              <h2>打开一篇 PDF 文献开始阅读</h2>
              <p>从左侧文献库选择，或导入新的 PDF 文件</p>
            </div>
          </div>
        </div>
      </section>

      <div class="resize-handle resize-handle-right" id="resize-right"></div>

      <aside id="sidebar-right" class="sidebar sidebar-right">
        <div class="sidebar-header sidebar-header-col">
          <div class="workspace-switch" id="workspace-switch">
            <button class="workspace-btn active" data-workspace="notes">笔记</button>
            <button class="workspace-btn" data-workspace="summary">总结</button>
          </div>

          <div id="notes-tab-bar" class="notes-tabs">
            <button class="tab-btn active" data-tab="editor">编辑</button>
            <button class="tab-btn" data-tab="preview">预览</button>
            <button class="tab-btn" data-tab="annotations">标注</button>
          </div>

          <div id="summary-tab-bar" class="notes-tabs" style="display:none;">
            <button class="summary-tab-btn active" data-summary-tab="editor">编辑</button>
            <button class="summary-tab-btn" data-summary-tab="preview">预览</button>
          </div>
        </div>

        <div id="workspace-notes" class="workspace-panel active">
          <div id="notes-file-bar" class="notes-file-bar">
            <select id="note-select" class="note-select">
              <option value="">-- 请先打开 PDF --</option>
            </select>
            <button id="btn-new-note" class="btn-small" title="新建笔记">+</button>
            <button id="btn-delete-note" class="btn-small btn-danger" title="删除笔记">🗑</button>
          </div>

          <div id="notes-content-layout" class="notes-content-layout">
            <div id="notes-outline-panel" class="notes-outline-panel">
              <div class="notes-outline-header">
                <span class="notes-outline-title">段落目录</span>
                <button id="btn-toggle-notes-outline" class="btn-small" title="折叠目录">⟨</button>
              </div>
              <div id="notes-outline-list" class="notes-outline-list">
                <p class="empty-hint">暂无目录项</p>
              </div>
            </div>

            <div id="notes-content-main" class="notes-content-main">
              <div id="tab-editor" class="tab-panel active">
                <textarea id="note-editor" class="note-editor" placeholder="在此编写 Markdown 笔记...&#10;&#10;提示：选中 PDF 文本后点击“📝”可快速插入引用"></textarea>
              </div>

              <div id="tab-preview" class="tab-panel">
                <div id="note-preview" class="note-preview markdown-body"></div>
              </div>

              <div id="tab-annotations" class="tab-panel">
                <div id="annotations-list" class="annotations-list">
                  <p class="empty-hint">暂无标注</p>
                </div>
              </div>
            </div>
          </div>

          <div class="notes-actions">
            <button id="btn-export-note" class="btn-action" title="导出当前笔记">导出</button>
            <button id="btn-export-all" class="btn-action" title="导出全部笔记">全部导出</button>
            <button id="btn-set-save-path" class="btn-action" title="设置存储路径">存储路径</button>
          </div>
        </div>

        <div id="workspace-summary" class="workspace-panel" style="display:none;">
          <div class="notes-file-bar summary-file-bar">
            <span class="summary-title">文献总结模板</span>
            <button id="btn-reset-summary" class="btn-small" title="重置总结模板">重置</button>
          </div>

          <div id="summary-tab-editor" class="summary-tab-panel active">
            <textarea id="summary-editor" class="note-editor" placeholder="按模板整理文献总结..."></textarea>
          </div>

          <div id="summary-tab-preview" class="summary-tab-panel">
            <div id="summary-preview" class="note-preview markdown-body">
              <p class="empty-hint">请先打开 PDF 文献</p>
            </div>
          </div>

          <div class="notes-actions">
            <button id="btn-export-summary" class="btn-action" title="导出文献总结">导出总结</button>
          </div>
        </div>
      </aside>
    </main>

    <div id="annotation-toolbar" class="annotation-toolbar" style="display:none;">
      <button class="color-btn" data-color="#FBBF24" title="黄色标注" style="background:#FBBF24;"></button>
      <button class="color-btn" data-color="#34D399" title="绿色标注" style="background:#34D399;"></button>
      <button class="color-btn" data-color="#60A5FA" title="蓝色标注" style="background:#60A5FA;"></button>
      <button class="color-btn" data-color="#A78BFA" title="紫色标注" style="background:#A78BFA;"></button>
      <button class="color-btn" data-color="#F87171" title="红色标注" style="background:#F87171;"></button>
      <div class="toolbar-divider"></div>
      <button id="btn-insert-to-note" class="insert-btn" title="插入到笔记">📝</button>
    </div>

    <div id="annotation-context-menu" class="annotation-context-menu" style="display:none;">
      <button id="ctx-view-note" class="ctx-menu-btn">查看笔记</button>
      <button id="ctx-delete-annotation" class="ctx-menu-btn ctx-menu-danger">删除标注</button>
    </div>

    <div id="settings-modal" class="modal" style="display:none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>设置</h3>
          <button id="btn-close-settings" class="btn-close">×</button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label>笔记存储路径</label>
            <div class="setting-path">
              <span id="save-path-display" class="path-display">未设置（使用浏览器下载）</span>
              <button id="btn-choose-path" class="btn-accent">选择目录</button>
            </div>
            <p class="setting-hint">选择本地文件夹后，导出会按“文献名/笔记.md”结构保存。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
